<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Biotiza isotipo">
  <!--
    Biotiza — Isotipo oficial
    Plántula naciendo de surcos cultivados. Símbolo de bio-soluciones
    agrícolas. Variante a color (verde oscuro + naranja brand).
  -->
  <defs>
    <linearGradient id="bz-stem-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0d5c4a" />
      <stop offset="100%" stop-color="#0a4a3b" />
    </linearGradient>
    <linearGradient id="bz-field-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e7a5e" />
      <stop offset="100%" stop-color="#0d5c4a" />
    </linearGradient>
    <linearGradient id="bz-petal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a1a" />
      <stop offset="100%" stop-color="#e8690f" />
    </linearGradient>
  </defs>

  <!-- ── Campos / surcos cultivados (3 surcos en abanico a cada lado) ── -->
  <!-- surco exterior izquierdo -->
  <path d="M 12 178 Q 38 120 100 116 L 100 134 Q 50 138 30 178 Z" fill="url(#bz-field-grad)" />
  <!-- surco medio izquierdo -->
  <path d="M 22 158 Q 50 108 100 102 L 100 118 Q 62 122 42 158 Z" fill="url(#bz-field-grad)" opacity="0.95" />
  <!-- surco interior izquierdo -->
  <path d="M 36 138 Q 65 96 100 90 L 100 104 Q 75 108 56 138 Z" fill="url(#bz-field-grad)" opacity="0.9" />

  <!-- surco exterior derecho -->
  <path d="M 188 178 Q 162 120 100 116 L 100 134 Q 150 138 170 178 Z" fill="url(#bz-field-grad)" />
  <!-- surco medio derecho -->
  <path d="M 178 158 Q 150 108 100 102 L 100 118 Q 138 122 158 158 Z" fill="url(#bz-field-grad)" opacity="0.95" />
  <!-- surco interior derecho -->
  <path d="M 164 138 Q 135 96 100 90 L 100 104 Q 125 108 144 138 Z" fill="url(#bz-field-grad)" opacity="0.9" />

  <!-- ── Tallo central ── -->
  <rect x="93" y="62" width="14" height="58" rx="3" fill="url(#bz-stem-grad)" />

  <!-- ── Hojas cotiledones (forma corazón invertida naranja) ── -->
  <!-- Cotiledón izquierdo -->
  <path d="M 100 40 Q 98 22 78 18 Q 54 18 50 38 Q 50 56 70 64 Q 88 68 100 60 Z" fill="url(#bz-petal-grad)" />
  <!-- Slit/incisión cotiledón izquierdo (efecto de hoja embrionaria) -->
  <ellipse cx="74" cy="42" rx="14" ry="4" fill="#ffffff" transform="rotate(-18 74 42)" />

  <!-- Cotiledón derecho -->
  <path d="M 100 40 Q 102 22 122 18 Q 146 18 150 38 Q 150 56 130 64 Q 112 68 100 60 Z" fill="url(#bz-petal-grad)" />
  <!-- Slit/incisión cotiledón derecho -->
  <ellipse cx="126" cy="42" rx="14" ry="4" fill="#ffffff" transform="rotate(18 126 42)" />

  <!-- Valle central entre los dos cotiledones (la V del corazón invertido) -->
  <path d="M 92 56 Q 100 64 108 56 L 108 60 Q 100 70 92 60 Z" fill="#ffffff" />
</svg>
